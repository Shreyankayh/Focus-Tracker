<!DOCTYPE html>
<html>
<head>
    <title>Focus Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .glass-card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .btn-custom {
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 500;
        }

        .table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .navbar-custom {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom px-4">
    <span class="navbar-brand fw-bold">🚀 Focus Tracker Pro</span>

    <div class="ms-auto">
        <a href="/logout" class="btn btn-warning btn-custom">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <!-- ADD NAME CARD -->
    <div class="glass-card mb-4">
        <h3 class="mb-4">✨ Add Your Focus Entry</h3>

        <form method="POST">
            <div class="row g-3">
                <div class="col-md-9">
                    <input type="text" name="name" class="form-control form-control-lg"
                        placeholder="Enter your focus task..." required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-light w-100 btn-custom">
                        Save
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- TABLE SECTION -->
    <div class="glass-card">
        <h4 class="mb-3">📊 Your Saved Entries</h4>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Task</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>
                        <a href="/delete/{{ row[0] }}"
                           class="btn btn-sm btn-danger btn-custom">
                           Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
